
[functions.sync-scores]
enabled = true
verify_jwt = false
import_map = "./functions/sync-scores/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/sync-scores/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/sync-scores/*.html" ]
# ── Append this block to supabase/config.toml ──
[functions.snapshot-ranks]
enabled = true
verify_jwt = false
import_map = "./functions/snapshot-ranks/deno.json"
entrypoint = "./functions/snapshot-ranks/index.ts"
